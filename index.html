<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Birthday Special 🎂</title>
<link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Quicksand:wght@400;600&display=swap" rel="stylesheet">
<style>
* { 
  margin: 0;
  padding: 0;
  box-sizing: border-box;
 }
 body {
    margin:0; 
    min-height: 100vh;
   background:radial-gradient(circle at top, #ffb300, #ff7e5f);   
  display: flex;  
   align-items: center; 
   justify-content: center;
    font-family: Arial, sans-serif;
    overflow: hidden;
  }
  body::before {
  content: "";
  position: absolute;
  width: 400px;
  height: 400px;
  background: radial-gradient(circle, rgba(255, 0, 150, 0.3), transparent);
  filter: blur(100px);
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
}
.stars {
position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    z-index: 0;
  }
  .star {
    position: absolute;
    background-color: white;
    border-radius: 50%;
    animation: twinkle var(--d) ease-in-out infinite alternate;
  }
  @keyframes twinkle {
    from { opacity: 0.1; transform: scale(0.8); }
    to   { opacity: 0.9; transform: scale(1.2); }
  }
  .card {
    position: relative;
    z-index: 10;
    background:lightblue;
    transition:0.3s;
    border-radius: 32px;
    padding: 48px 40px 40px;
    width: min(400px, 92vw);
    box-shadow: 0 0 60px rgba(255, 0, 150, 0.3),
    0 0 120px rgba(255, 100, 180, 0.2);
    animation: cinematicIn 1.2s ease forwards;
  }
  .card:hover { 
       transform: translateY(-10px) scale(1.03);
       box-shadow:0 20px 40px rgba(0,0,0,0.2);
  }
  @keyframes cinematicIn {
  0% {
    opacity: 0;
    transform: scale(0.7) translateY(80px);
  }
  100% {
    opacity: 1;
    transform: scale(1) translateY(0);
  }
} 
    @keyframes cardIn {
    from { opacity: 0; transform: scale(0.7) translateY(60px); }
    to   { opacity: 1; transform: scale(1) translateY(0); }
  }
  .confetti-container {
    position: fixed;
    top: 0;
    left: 0;
    width: 90%;
    height: 90%;
    pointer-events: none;
    z-index: 5;
  }
  .bg-glow {
  position: absolute;
  top: 50%;
  left: 50%;
  width: 500px;
  height: 500px;
  background-color: radial-gradient(circle, rgba(255,120,0,0.5));
  transform: translate(-50%, -50%);
  z-index: 0;
}
  .confetti-piece {
    position: absolute;
    top: -20px;
    border-radius: 2px;
    animation: confettiFall var(--fall-duration) var(--fall-delay) linear infinite;
    opacity: 0;
  }
  @keyframes confettiFall {
    0%   { transform: translateY(-20px) rotate(0deg); opacity: 1; }
    100% { transform: translateY(110vh) rotate(720deg); opacity: 0.3; }
  }
  .cake-wrapper {
    position: relative;
    display: inline-block;
    margin-bottom: 24px;
    animation: float 3s ease-in-out infinite;
  }
  @keyframes float {
    0% { 
      transform: translateY(0px);
     }
    50% {
       transform: translateY(-9px);
       }
     100% {
       transform: translateY(0px);  

  }
}
  .plate {
    width: 160px;
    height: 10px;
    background: linear-gradient(180deg, #e8d5c4, #c4a882);
    border-radius: 50%;
    margin: 0 auto;
    box-shadow: 0 4px 8px rgba(0,0,0,0.2);
    position: relative;
    z-index: 1;
  }
  .cake-bottom {
    width: 140px;
    height: 50px;
    background: linear-gradient(180deg, #5c3317, #3d200e);
    border-radius: 8px 8px 4px 4px;
    margin: -2px auto 0;
    position: relative;
    overflow: hidden;
  }
  .cake-bottom::after {
    content: '';
    position: absolute;
    top: 8px; left: 12px; right: 12px;
    height: 6px;
    background: rgba(255,200,150,0.15);
    border-radius: 3px;
  }
 .frosting-bottom {
    width: 148px;
    height: 18px;
    background:#fff;
    border-radius: 4px 4px 0 0;
    margin: 0 auto;
    position: relative;
    top: 2px;
  }
  .cake-top {
    width: 100px;
    height: 40px;
    background: linear-gradient(180deg, #e8607a, #c23060);
    border-radius: 8px 8px 4px 4px;
    margin: 0 auto;
    position: relative;
    top: -4px;
  }
  .frosting-top {
    width: 106px;
    height: 14px;
    background: #fff;
    border-radius: 4px 4px 0 0;
    margin: 0 auto;
    position: relative;
    top: -6px;
  }
  .candle {
    width: 10px;
    height: 30px;
    background: linear-gradient(180deg, #fff7b5, #ffe066);
    border-radius: 4px 4px 2px 2px;
    margin: 0 auto;
    position: relative;
    top: -18px;
    box-shadow: 0 0 6px rgba(255,220,0,0.3);
  }
.candle::before {
    content: '';
    position: absolute;
    top: -1px; left: 50%;
    transform: translateX(-50%);
    width: 4px;
    height: 10px;
    background: #333;
    border-radius: 2px;
  }
  h1 {
    color:#ff2e63;
    font-size: 2.2em;
  }
p {
   color:#444;
}
  .flame {
    width: 16px;
    height: 22px;
    background: radial-gradient(ellipse at 50% 80%, #fff176 0%, #ffb300 40%, #e53935 80%, transparent 100%);
    border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%;
    position: absolute;
    top: -28px;
    left: 50%;
    transform: translateX(-50%);
    animation: flicker 0.3s ease-in-out infinite alternate;
    box-shadow: 0 0 12px 4px rgba(255,200,0,0.6), 0 0 30px 10px rgba(255,100,0,0.2);
  }
  @keyframes flicker {
    0%   { transform: translateX(-50%) scaleX(1)    scaleY(1)    rotate(-2deg); }
    25%  { transform: translateX(-50%) scaleX(0.9)  scaleY(1.05) rotate(1deg); }
    50%  { transform: translateX(-50%) scaleX(1.05) scaleY(0.95) rotate(-1deg); }
    75%  { transform: translateX(-50%) scaleX(0.95) scaleY(1.08) rotate(2deg); }
    100% { transform: translateX(-50%) scaleX(1)    scaleY(1)    rotate(0deg); }
    opacity:1;
  }
  .dots {
    display: flex;
    justify-content: center;
    gap: 10px;
    position: relative;
    top: -52px;
    margin-bottom: -40px;
  }
  .dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    animation: dotPulse 1.5s ease-in-out infinite alternate;
  }
  .dot:nth-child(1) { background: #ff6b9d; animation-delay: 0s; }
  .dot:nth-child(2) { background: #ffd93d; animation-delay: 0.3s; }
  .dot:nth-child(3) { background: #6bcb77; animation-delay: 0.6s; }
  .dot:nth-child(4) { background: #4d96ff; animation-delay: 0.9s; }
  .dot:nth-child(5) { background: #ff6b9d; animation-delay: 1.2s; }
  @keyframes dotPulse {
    from { transform: scale(1); }
    to   { transform: scale(1.4); box-shadow: 0 0 6px currentColor; }
  }
  .hearts {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    pointer-events: none;
    overflow: hidden;
    border-radius: 32px;
  }
  .heart {
    position: absolute;
    bottom: 0;
    font-size: 20px;
    bottom: 20%;
    left: var(--x);
    animation: heartFloat var(--dur) var(--delay) ease-in infinite;
    opacity: 0;
  }
  @keyframes gradientBG {
    0% {
      background-position: 0% 50%;
    }
    50% {
      background-position: 50% 100%;
    }
    100% {
      background-position: 0% 50%;
    }
  }
  @keyframes heartFloat {
    0%   { transform: translateY(0) scale(0.5); opacity: 0; }
    20%  { opacity: 1; }
    80%  { opacity: 0.6; }
    100% { transform: translateY(-200px) scale(1); opacity: 0; }
  }
  .title {
    font-family: 'Dancing Script', cursive;
    font-size: 2.4rem;
    color: #c2185b;
    line-height: 1.2;
    margin-bottom: 12px;
    animation: textGlow 2s ease-in-out infinite alternate;
  }
  @keyframes textGlow {
    from { text-shadow: 2px 2px 8px rgba(194,24,91,0.2); }
    to   { text-shadow: 2px 2px 20px rgba(194,24,91,0.6), 0 0 40px rgba(255,100,150,0.3); }
  }
  .subtitle {
    font-size: 0.95rem;
    color: #ad5070;
    letter-spacing: 0.05em;
    margin-bottom: 20px;
  }
  .divider {
    width: 60px;
    height: 2px;
    background: linear-gradient(90deg, transparent, #e91e8c, transparent);
    margin: 0 auto 20px;
    border-radius: 2px;
  }
   @keyframes floatUp {
    0% {
       transform: translateY(0);
       opacity: 1;
    }  
    100% {
      transform: translateY(-500px);
       opacity: 0;
    }
  }
  .message {
    font-size: 0.88rem;
    color: #7b4060;
    line-height: 1.7;
    padding: 0 8px;
    font-weight: 600;
  }
  .emoji-row {
    font-size: 1.4rem;
    margin-top: 20px;
    letter-spacing: 6px;
    animation: bounce 1s ease-in-out infinite alternate;
  }
  @keyframes bounce {
    from { transform: translateY(0); }
    to   { transform: translateY(-4px); }
  }
  .card {
    width:320px; 
    padding: 20px;
    background: rgba(255,255,255,0.2);
    border-radius: 20px;
    text-align: center;
    background: #ffffff;
    box-shadow: 0 0 40px rgba(255,0,150,0.3);
  }
 button {
  background: linear-gradient(45deg, #ff4e50, #f9d423);
  border-radius: 25px;
  padding: 10px 20px;
  color: white;
  border: none;
} 

  .title {
  font-family: 'Dancing Script', cursive;
  font-size: 2.4rem;
  color: #c2185b;
  line-height: 1.3;
  margin-bottom: 12px;
  text-align: center;
  width: 100%;
  overflow: visible;
  animation: textGlow 2s ease-in-out
 infinite alternative;
}
@keyframes blink {
  50% { border-color: transparent; }
}
</style>
</head>
<body>

<div class="stars" id="stars"></div>
<div class="confetti-container" id="confetti"></div>
<div class="card">
  <div class="hearts" id="hearts"></div>

  <div class="cake-wrapper">
    <div class="candle">
      <div class="flame"></div>
    </div>
    <div class="frosting-top"></div>
    <div class="cake-top"></div>
    <div class="frosting-bottom"></div>
    <div class="cake-bottom"></div>
    <div class="plate"></div>
    <div class="dots">
      <div class="dot"></div>
      <div class="dot"></div>
      <div class="dot"></div>
      <div class="dot"></div>
      <div class="dot"></div>
    </div>
  </div>

  <h1 class="title">Happy Birthday<br>Madam 🎊</h1>
  <div class="divider"></div>
  <p class="subtitle">Wishing you a day as beautiful as you are</p>
  <p class="message">
   May your birthday be filled with happiness, peace and success.
Keep smiling always 🙂
    🎂✨</p>
  <div class="emoji-row">🎂 🌸 💖 🎉 🌟</div>
</div>

<script>
  const starsEl = document.getElementById('stars');
  for (let i = 0; i < 120; i++) {
    const s = document.createElement('div');
    s.className = 'star';

    const size = Math.random() * 3 + 1;

    s.style.cssText = `
      width:${size}px;
      height:${size}px;
      left:${Math.random() * 100}%;
      top:${Math.random() * 100}%;
      --d:${(Math.random() * 3 + 1).toFixed(1)}s;
      animation-delay:${(Math.random() * 4).toFixed(1)}s;
    `;
    starsEl.appendChild(s);
  }
  // Confetti
  const confettiEl = document.getElementById('confetti');
  const colors = ['#ff6b9d','#ffd93d','#6bcb77','#4d96ff','#ff6348','#a29bfe','#fd79a8','#fdcb6e'];

  for (let i = 0; i < 60; i++) {
    const c = document.createElement('div');
    c.className = 'confetti-piece';
    const w = Math.random() * 8 + 4;
    const h = Math.random() * 12 + 5;
    c.style.cssText = `
      width:${w}px;
      height:${h}px;
      left:${Math.random() * 100}%;
      background:${colors[Math.floor(Math.random() * colors.length)]};
      --fall-duration:${(Math.random() * 4 + 3).toFixed(1)}s;
      --fall-delay:${(Math.random() * 5).toFixed(1)}s;
      border-radius:${Math.random() > 0.5 ? '50%' : '2px'};
    `;
    confettiEl.appendChild(c);
  }
  const heartsEl = document.getElementById('hearts');
  const heartEmojis = ['💖','💕','💗','🩷','💓'];
  for (let i = 0; i < 8; i++) {
    const heart = document.createElement('div');
    heart.className = 'heart';
    heart.textContent = heartEmojis[Math.floor(Math.random() * heartEmojis.length)];
   heart.style.cssText = `
      font-size:${(Math.random() * 0.8 + 0.6).toFixed(1)}rem;
      left:${Math.random() * 80 + 10}%;
      --dur:${(Math.random() * 3 + 3).toFixed(1)}s;
      --delay:${(Math.random() * 4).toFixed(1)}s;
    `;
   heartsEl.appendChild(heart);
  }
</script>
